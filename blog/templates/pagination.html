<p class="text-black-50">
  Page <b>{{ page.number }}</b> of <b>{{ page.paginator.num_pages }}</b>.
</p>

{% if page.has_previous %}

  <a class="btn btn-primary" href="?page={{ page.previous_page_number }}"><i
      class="arrow-prev fas fa-long-arrow-alt-left"></i> Previous
  </a>

{% endif %}

{% if page.has_next %}
  <a class="btn btn-primary" href="?page={{ page.next_page_number }}">Next
    <i class="arrow-next fas fa-long-arrow-alt-right"></i></a>
{% endif %}
